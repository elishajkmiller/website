name: Build blog

on:
  push:
    branches: [main]
    paths:
      - 'blog/posts/**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm install

      - run: node build.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/posts/ blog/index.html blog/rss.xml
          git diff --staged --quiet || git commit -m "build: generate post HTML"
          git push
